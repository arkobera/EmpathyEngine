app:
  output_dir: "outputs/audio"

emotion:
  model_name: "j-hartmann/emotion-english-distilroberta-base"

tts:
  provider: "elevenlabs"
  fallback: "gtts"
  voice_id: "hpp4J3VqNfWAUOO0d1Us"
  language: "en" 

voice_mapping:
  positive:
    stability: 0.3
    similarity_boost: 0.8
    style: 0.7
    speed: 1.1

  negative:
    stability: 0.7
    similarity_boost: 0.6
    style: 0.2
    speed: 0.9

  neutral:
    stability: 0.5
    similarity_boost: 0.75
    style: 0.5
    speed: 1.0

intensity:
  enable: true
  exclamation_boost: 0.1
  caps_boost: 0.1